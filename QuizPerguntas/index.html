<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz Interativo</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width: 600px;">

    <div id="tela-quiz" class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h1 id="tema-titulo" class="h5 mb-0">Quiz</h1>
          <span id="contador" class="badge text-bg-secondary"></span>
        </div>

        <div class="progress mb-4" style="height: 8px;">
          <div id="barra-progresso" class="progress-bar" style="width: 0%"></div>
        </div>

        <p id="pergunta-texto" class="fs-5 mb-4"></p>

        <div id="alternativas" class="list-group mb-4"></div>

        <div class="d-flex justify-content-between align-items-center">
          <span id="placar" class="text-muted small">Pontuação: 0</span>
          <button id="btn-proxima" class="btn btn-primary" disabled>Próxima</button>
        </div>
      </div>
    </div>

    <div id="tela-final" class="card shadow-sm d-none text-center">
      <div class="card-body py-5">
        <h2 class="mb-3">Quiz finalizado!</h2>
        <p class="fs-4 mb-4">Você acertou <span id="resultado-final"></span></p>
        <button id="btn-reiniciar" class="btn btn-outline-primary">Jogar novamente</button>
      </div>
    </div>

  </div>
</body>
</html>
